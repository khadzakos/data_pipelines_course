apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: etl-pipeline-
  namespace: argo
  labels:
    app: data-pipeline
spec:
  # ── Параметры пайплайна ────────────────────────────────────────────────────
  arguments:
    parameters:
      - name: source-uri
        value: "https://people.sc.fsu.edu/~jburkardt/data/csv/addresses.csv"
      - name: raw-path
        value: "/data/raw/input.csv"
      - name: output-path
        value: "/data/processed/output"
      - name: filter-sql
        value: ""                    # пустая строка = без фильтра
      - name: notify-channel
        value: "telegram"
      - name: pipeline-name
        value: "etl-pipeline"

  entrypoint: run-pipeline

  onExit: exit-notify

  templates:
    - name: run-pipeline
      dag:
        tasks:

          - name: ingest
            templateRef:
              name: data-ingestion
              template: ingest
            arguments:
              parameters:
                - name: source-uri
                  value: "{{workflow.parameters.source-uri}}"
                - name: destination
                  value: "{{workflow.parameters.raw-path}}"
                - name: expected-format
                  value: "csv"

          - name: transform
            dependencies: [ingest]
            templateRef:
              name: spark-transform
              template: transform
            arguments:
              parameters:
                - name: input-path
                  value: "{{tasks.ingest.outputs.parameters.saved-path}}"
                - name: output-path
                  value: "{{workflow.parameters.output-path}}"
                - name: input-format
                  value: "csv"
                - name: output-format
                  value: "parquet"
                - name: filter-sql
                  value: "{{workflow.parameters.filter-sql}}"
                - name: spark-master
                  value: "local[*]"

          - name: notify-success
            dependencies: [transform]
            templateRef:
              name: notification
              template: notify
            arguments:
              parameters:
                - name: channel
                  value: "{{workflow.parameters.notify-channel}}"
                - name: status
                  value: "success"
                - name: pipeline-name
                  value: "{{workflow.parameters.pipeline-name}}"
                - name: message
                  value: >-
                    Ingested {{tasks.ingest.outputs.parameters.row-count}} rows.
                    After transform: {{tasks.transform.outputs.parameters.records-out}} records
                    saved to {{tasks.transform.outputs.parameters.output-path}}.

    - name: exit-notify
      steps:
        - - name: send-exit-notification
            templateRef:
              name: notification
              template: notify
            arguments:
              parameters:
                - name: channel
                  value: "{{workflow.parameters.notify-channel}}"
                - name: status
                  value: "{{workflow.status}}"   # Succeeded | Failed | Error
                - name: pipeline-name
                  value: "{{workflow.parameters.pipeline-name}}"
                - name: message
                  value: "Workflow {{workflow.name}} finished with status: {{workflow.status}}"
