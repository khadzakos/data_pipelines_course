apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: data-ingestion
  namespace: argo
  labels:
    layer: ingestion
spec:
  templates:
    - name: ingest
      inputs:
        parameters:
          - name: source-uri
          - name: destination
            value: "/data/raw/file"
          - name: expected-format
            value: "csv"
      outputs:
        parameters:
          - name: saved-path
            valueFrom:
              path: /tmp/saved-path.txt
          - name: row-count
            valueFrom:
              path: /tmp/row-count.txt
          - name: status
            valueFrom:
              path: /tmp/status.txt
      container:
        image: python:3.11-slim
        command: [python, -c]
        args:
          - |
            import urllib.request, subprocess, json, pathlib, sys

            uri  = "{{inputs.parameters.source-uri}}"
            dest = "{{inputs.parameters.destination}}"
            fmt  = "{{inputs.parameters.expected-format}}"

            pathlib.Path(dest).parent.mkdir(parents=True, exist_ok=True)

            # Загрузка
            if uri.startswith("s3://"):
                subprocess.run(["aws", "s3", "cp", uri, dest], check=True)
            else:
                urllib.request.urlretrieve(uri, dest)
            print(f"[ingest] saved to {dest}")

            # Подсчёт строк
            row_count = -1
            if fmt == "csv":
                with open(dest) as f:
                    row_count = sum(1 for _ in f) - 1   # минус заголовок
            elif fmt == "json":
                with open(dest) as f:
                    data = json.load(f)
                row_count = len(data) if isinstance(data, list) else 1

            status = "ok" if row_count != 0 else "empty"
            print(f"[ingest] rows={row_count}, status={status}")

            open("/tmp/saved-path.txt", "w").write(dest)
            open("/tmp/row-count.txt",  "w").write(str(row_count))
            open("/tmp/status.txt",     "w").write(status)
        resources:
          requests: {memory: "128Mi", cpu: "100m"}
          limits:   {memory: "256Mi", cpu: "300m"}
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: access-key-id
                optional: true
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: secret-access-key
                optional: true
