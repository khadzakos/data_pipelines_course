# =============================================================================
# WorkflowTemplate 3: Notification
# =============================================================================
# Отправляет уведомление в Slack или Telegram о статусе пайплайна.
# Используется как в штатных сценариях, так и в onExit-хуке при ошибке.
#
# inputs.parameters:
#   channel        — slack | telegram
#   status         — success | failed | warning
#   pipeline-name  — имя пайплайна
#   message        — текст сообщения
#
# outputs.parameters:
#   sent-at        — timestamp отправки (ISO 8601 UTC)
#   channel-used   — канал, через который отправлено
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: notification
  namespace: argo
  labels:
    layer: observability
spec:
  templates:
    - name: notify
      inputs:
        parameters:
          - name: channel
            value: "slack"
          - name: status
            value: "info"
          - name: pipeline-name
          - name: message
      outputs:
        parameters:
          - name: sent-at
            valueFrom:
              path: /tmp/sent-at.txt
          - name: channel-used
            valueFrom:
              path: /tmp/channel-used.txt
      container:
        image: python:3.11-slim
        command: [python, -c]
        args:
          - |
            import os, json, datetime, urllib.request

            channel  = "{{inputs.parameters.channel}}"
            status   = "{{inputs.parameters.status}}"
            name     = "{{inputs.parameters.pipeline-name}}"
            message  = "{{inputs.parameters.message}}"

            icons = {"success": "✅", "failed": "❌", "warning": "⚠️", "info": "ℹ️"}
            icon  = icons.get(status, "ℹ️")
            now   = datetime.datetime.utcnow().isoformat() + "Z"
            text  = f"{icon} *{name}* [{status.upper()}]\n{message}\n_Time: {now}_"

            sent = False

            if channel == "slack":
                webhook = os.getenv("SLACK_WEBHOOK_URL", "")
                if webhook:
                    payload = {"text": text}
                    req = urllib.request.Request(
                        webhook,
                        data=json.dumps(payload).encode(),
                        headers={"Content-Type": "application/json"}
                    )
                    urllib.request.urlopen(req, timeout=10)
                    sent = True
                    print(f"[notify] Slack: sent")

            elif channel == "telegram":
                token   = os.getenv("TELEGRAM_BOT_TOKEN", "")
                chat_id = os.getenv("TELEGRAM_CHAT_ID", "")
                if token and chat_id:
                    payload = {"chat_id": chat_id, "text": text, "parse_mode": "Markdown"}
                    url = f"https://api.telegram.org/bot{token}/sendMessage"
                    req = urllib.request.Request(
                        url,
                        data=json.dumps(payload).encode(),
                        headers={"Content-Type": "application/json"}
                    )
                    urllib.request.urlopen(req, timeout=10)
                    sent = True
                    print(f"[notify] Telegram: sent")

            if not sent:
                print(f"[notify] No credentials for '{channel}', printing only:\n{text}")

            open("/tmp/sent-at.txt",     "w").write(now)
            open("/tmp/channel-used.txt","w").write(channel if sent else "none")
        resources:
          requests: {memory: "64Mi",  cpu: "50m"}
          limits:   {memory: "128Mi", cpu: "100m"}
        env:
          - name: SLACK_WEBHOOK_URL
            valueFrom:
              secretKeyRef:
                name: notification-secrets
                key: slack-webhook-url
                optional: true
          - name: TELEGRAM_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: notification-secrets
                key: telegram-bot-token
                optional: true
          - name: TELEGRAM_CHAT_ID
            valueFrom:
              secretKeyRef:
                name: notification-secrets
                key: telegram-chat-id
                optional: true
