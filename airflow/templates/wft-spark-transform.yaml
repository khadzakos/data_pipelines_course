# =============================================================================
# WorkflowTemplate 2: Spark Transformation
# =============================================================================
# Запускает PySpark-задание: читает данные, применяет SQL-фильтр, пишет результат.
#
# inputs.parameters:
#   input-path     — путь к входным данным (local/S3/HDFS)
#   output-path    — путь для записи результата
#   input-format   — csv | json | parquet
#   output-format  — csv | json | parquet
#   filter-sql     — SQL WHERE-выражение (опционально, "" = без фильтра)
#   spark-master   — local[*] | spark://host:7077
#
# outputs.parameters:
#   output-path    — путь к результату
#   records-in     — число входных записей
#   records-out    — число выходных записей
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: spark-transform
  namespace: argo
  labels:
    layer: transformation
spec:
  templates:
    - name: transform
      inputs:
        parameters:
          - name: input-path
          - name: output-path
          - name: input-format
            value: "parquet"
          - name: output-format
            value: "parquet"
          - name: filter-sql
            value: ""
          - name: spark-master
            value: "local[*]"
      outputs:
        parameters:
          - name: output-path
            valueFrom:
              path: /tmp/output-path.txt
          - name: records-in
            valueFrom:
              path: /tmp/records-in.txt
          - name: records-out
            valueFrom:
              path: /tmp/records-out.txt
      container:
        image: bitnami/spark:3.5
        command: [bash, -c]
        args:
          - |
            cat > /tmp/job.py << 'PYEOF'
            import sys, json, time
            from pyspark.sql import SparkSession

            in_path, out_path, in_fmt, out_fmt, filter_sql, master = sys.argv[1:]

            spark = (SparkSession.builder
                     .master(master)
                     .appName("spark-transform")
                     .getOrCreate())
            spark.sparkContext.setLogLevel("WARN")

            df = (spark.read.format(in_fmt)
                  .option("header", "true")
                  .option("inferSchema", "true")
                  .load(in_path))
            records_in = df.count()

            if filter_sql:
                df = df.filter(filter_sql)
            records_out = df.count()

            (df.write.format(out_fmt)
               .mode("overwrite")
               .option("header", "true")
               .save(out_path))

            open("/tmp/output-path.txt", "w").write(out_path)
            open("/tmp/records-in.txt",  "w").write(str(records_in))
            open("/tmp/records-out.txt", "w").write(str(records_out))
            print(f"[spark] in={records_in} out={records_out} -> {out_path}")
            spark.stop()
            PYEOF

            spark-submit \
              --master "{{inputs.parameters.spark-master}}" \
              /tmp/job.py \
              "{{inputs.parameters.input-path}}" \
              "{{inputs.parameters.output-path}}" \
              "{{inputs.parameters.input-format}}" \
              "{{inputs.parameters.output-format}}" \
              "{{inputs.parameters.filter-sql}}" \
              "{{inputs.parameters.spark-master}}"
        resources:
          requests: {memory: "1Gi",  cpu: "500m"}
          limits:   {memory: "2Gi",  cpu: "1500m"}
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: access-key-id
                optional: true
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: secret-access-key
                optional: true
